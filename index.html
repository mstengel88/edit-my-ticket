  <body>
    <style>
      #app-startup {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f2f7f5;
        z-index: 9999;
      }

      #app-startup-inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 18px;
        padding: 24px;
        text-align: center;
      }

      #app-startup img {
        width: min(240px, 60vw);
        height: auto;
      }

      #app-startup-spinner {
        width: 28px;
        height: 28px;
        border-radius: 9999px;
        border: 3px solid rgba(15, 23, 42, 0.15);
        border-top-color: rgba(15, 23, 42, 0.55);
        animation: app-startup-spin 0.8s linear infinite;
      }

      @keyframes app-startup-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
    <div id="app-startup" aria-hidden="true">
      <div id="app-startup-inner">
        <img src="/apple-touch-icon.png" alt="Ticket Creator" />
        <div id="app-startup-spinner"></div>
      </div>
    </div>
    <div id="root"></div>
